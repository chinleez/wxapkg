name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: wxapkg_macos_arm64
            linux: false
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: wxapkg_macos_amd64
            linux: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: wxapkg_linux_amd64
            linux: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: wxapkg_linux_arm64
            linux: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: wxapkg_windows_amd64.exe
            linux: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Setup Linux cross toolchain
        if: ${{ matrix.linux }}
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename binary
        shell: bash
        run: |
          src=target/${{ matrix.target }}/release/wxapkg
          [[ "${{ matrix.target }}" == *windows* ]] && src="${src}.exe"
          cp "$src" "${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: wxapkg_*
          generate_release_notes: true
