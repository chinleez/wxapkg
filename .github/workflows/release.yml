name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish, for example v0.0.4'
        required: true
        type: string

env:
  ANDROID_API: 23

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: wxapkg_macos_arm64
            android: false
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: wxapkg_macos_amd64
            android: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: wxapkg_windows_amd64.exe
            android: false
          - os: ubuntu-latest
            target: aarch64-linux-android
            artifact: wxapkg_android_arm64-v8a
            android: true
            cargo_target_env: AARCH64_LINUX_ANDROID
            linker_prefix: aarch64-linux-android
          - os: ubuntu-latest
            target: armv7-linux-androideabi
            artifact: wxapkg_android_armeabi-v7a
            android: true
            cargo_target_env: ARMV7_LINUX_ANDROIDEABI
            linker_prefix: armv7a-linux-androideabi
          - os: ubuntu-latest
            target: x86_64-linux-android
            artifact: wxapkg_android_x86_64
            android: true
            cargo_target_env: X86_64_LINUX_ANDROID
            linker_prefix: x86_64-linux-android
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Setup Android NDK
        if: ${{ matrix.android }}
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: false
      - uses: Swatinem/rust-cache@v2
      - name: Build
        if: ${{ ! matrix.android }}
        run: cargo build --release --target ${{ matrix.target }}
      - name: Build Android
        if: ${{ matrix.android }}
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          export CARGO_TARGET_${{ matrix.cargo_target_env }}_LINKER="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.linker_prefix }}${ANDROID_API}-clang"
          cargo build --release --target ${{ matrix.target }}
      - name: Rename binary
        shell: bash
        run: |
          src=target/${{ matrix.target }}/release/wxapkg
          [[ "${{ matrix.target }}" == *windows* ]] && src="${src}.exe"
          cp "$src" "${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: wxapkg_*
          generate_release_notes: true
